[package]
name = "raia-shell"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
description = "Text-mode Raia Shell — the first human shell over the continuity runtime"

[[bin]]
name = "raia-shell"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["stream", "multipart", "json"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
rustyline = "15"
crossterm = "0.28"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
